server {
  listen 80;
  listen 443 ssl;
  listen [::]:443 ssl;

  server_name plantuml.wansong.vip;
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
  ssl_prefer_server_ciphers on;
  ssl_certificate /root/.acme.sh/wansong.vip_ecc/fullchain.cer;
  ssl_certificate_key     /root/.acme.sh/wansong.vip_ecc/wansong.vip.key;

  root /var/www/html/plantuml;

  location / {
	  proxy_set_header  HOST               $host;
	  proxy_set_header  X-Forwarded-Host   $host;
	  proxy_set_header  X-Forwarded-Proto  $scheme;

	  proxy_pass http://127.0.0.1:8020/;
  }

  location /plugins/ {
          try_files $uri =404;
  }
}
