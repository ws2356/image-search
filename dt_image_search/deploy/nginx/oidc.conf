upstream oidc {
    server 127.0.0.1:8050;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;

	server_name oidcpro.wansong.vip;

# add_header Content-Security-Policy "default-src 'self'; frame-src *; img-src *; font-src *; style-src *";

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
		ssl_prefer_server_ciphers on;
  ssl_certificate /root/.acme.sh/wansong.vip_ecc/fullchain.cer;
  ssl_certificate_key     /root/.acme.sh/wansong.vip_ecc/wansong.vip.key;

	location / {
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Host $host;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_pass http://oidc/;
	}

	index index.html;
	root "/var/www/html";
}

