pluginManagement {
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)
  
  def expoModulesAutolinkingDir = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile()
  def expoPluginsPath = new File(expoModulesAutolinkingDir, "android/expo-gradle-plugin").absolutePath
  includeBuild(expoPluginsPath)

  def expoModulesCoreDir = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('expo-modules-core/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile()
  def expoModulePluginPath = new File(expoModulesCoreDir, "expo-module-gradle-plugin").absolutePath
  includeBuild(expoModulePluginPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'AuBackup'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)

def expoModulesCoreDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('expo-modules-core/package.json', { paths: [require.resolve('expo/package.json')] })")
  }.standardOutput.asText.get().trim()
).getParentFile()
includeBuild(new File(expoModulesCoreDir, "expo-module-gradle-plugin"))
include(":expo-modules-core")
project(":expo-modules-core").projectDir = new File(expoModulesCoreDir, "android")
