<!doctype html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AuSearch & AuBackup | Official downloads</title>
  <meta
    name="description"
    content="Official bilingual landing page for AuSearch desktop and AuBackup iOS, with product overview, downloads, screenshots, privacy, support, and FAQ."
  >
  <style>
    :root {
      color-scheme: dark;
      --bg: #08101d;
      --bg-soft: #111a2c;
      --panel: rgba(15, 22, 36, 0.78);
      --panel-strong: rgba(11, 17, 29, 0.92);
      --line: rgba(255, 255, 255, 0.1);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #f5f8fc;
      --muted: #a4b3c9;
      --brand-a: #007aff;
      --brand-b: #34aadc;
      --brand-c: #0055d4;
      --success: #30d158;
      --warn: #ff9f0a;
      --shadow: 0 28px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--text);
      font: 16px/1.5 Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(52, 170, 220, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(0, 122, 255, 0.16), transparent 26%),
        linear-gradient(180deg, #07101d, #0b1322 48%, #09101c);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .site-shell {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding-bottom: 64px;
    }

    .topbar {
      position: sticky;
      top: 16px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 16px 0 28px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(8, 13, 23, 0.72);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand__mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: #06111c;
      font-size: 18px;
      font-weight: 800;
    }

    .brand strong {
      display: block;
      font-size: 15px;
      letter-spacing: 0.01em;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .topnav {
      display: flex;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .topnav a:hover {
      color: var(--text);
    }

    .lang-toggle,
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-weight: 700;
      transition: transform 0.16s ease, opacity 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .lang-toggle {
      min-height: 42px;
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--line);
      color: var(--text);
      cursor: pointer;
    }

    .lang-toggle:hover,
    .button:hover {
      transform: translateY(-1px);
    }

    .button {
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: #06111c;
    }

    .button--ghost {
      background: transparent;
      border-color: var(--line);
      color: var(--text);
    }

    .button--muted {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--line);
      color: var(--muted);
    }

    .button[aria-disabled="true"],
    .button:disabled {
      pointer-events: none;
      opacity: 0.58;
      filter: saturate(0.75);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      padding: 18px 0 22px;
    }

    .hero__copy,
    .hero__visual,
    .card,
    .download,
    .shot,
    .faq details,
    .info-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .hero__copy {
      padding: 32px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
    }

    h1 {
      margin: 18px 0 16px;
      font-size: clamp(38px, 7vw, 64px);
      line-height: 1.03;
      letter-spacing: -0.03em;
    }

    .lead {
      max-width: 62ch;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .hero__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .hero__meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 28px 0 0;
      padding: 0;
      list-style: none;
    }

    .hero__meta li {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .meta__label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .hero__visual {
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .device {
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
    }

    .device--desktop {
      min-height: 350px;
      border-radius: 24px;
    }

    .device--phone {
      justify-self: end;
      width: min(240px, 62%);
      min-height: 280px;
      border-radius: 34px;
    }

    .device__chrome {
      display: flex;
      gap: 8px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }

    .device__chrome span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.24);
    }

    .mock-search {
      padding: 22px;
    }

    .mock-bar {
      display: flex;
      align-items: center;
      height: 48px;
      padding: 0 16px;
      margin-bottom: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 14px;
    }

    .mock-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .mock-tile {
      aspect-ratio: 1 / 1.12;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top, rgba(52, 170, 220, 0.36), transparent 44%),
        linear-gradient(180deg, rgba(0, 122, 255, 0.2), rgba(0, 85, 212, 0.2));
    }

    .mock-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .mock-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      font-size: 13px;
    }

    .mock-phone {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .mock-phone__card {
      min-height: 86px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.07);
    }

    .section {
      padding-top: 28px;
    }

    .section__intro {
      margin-bottom: 18px;
    }

    .section__intro h2 {
      margin: 12px 0 10px;
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .section__intro p {
      max-width: 72ch;
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid--2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card,
    .download,
    .info-panel {
      padding: 24px;
    }

    .card h3,
    .download h3,
    .info-panel h3 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
    }

    .card p,
    .download p,
    .info-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .feature-list {
      display: grid;
      gap: 10px;
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
    }

    .feature-list li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .feature-list strong {
      display: block;
      margin-bottom: 2px;
      color: var(--text);
    }

    .feature-list span:last-child {
      color: var(--muted);
    }

    .dot {
      flex: none;
      width: 10px;
      height: 10px;
      margin-top: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), var(--brand-a));
    }

    .downloads {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 13px;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .pill--live {
      color: #d1fae5;
      background: rgba(48, 209, 88, 0.12);
    }

    .pill--pending {
      color: #fde68a;
      background: rgba(255, 159, 10, 0.12);
    }

    .download__actions {
      margin-top: 18px;
    }

    .shots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .shot {
      overflow: hidden;
    }

    .shot__frame {
      position: relative;
      aspect-ratio: 16 / 10;
      background:
        linear-gradient(135deg, rgba(52, 170, 220, 0.12), rgba(0, 122, 255, 0.12)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
    }

    .shot img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.24s ease;
    }

    .shot.is-ready img {
      opacity: 1;
    }

    .shot__placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      gap: 10px;
      padding: 24px;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(52, 170, 220, 0.1), rgba(0, 122, 255, 0.1)),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0 12px, transparent 12px 24px);
      color: var(--muted);
      transition: opacity 0.24s ease;
    }

    .shot.is-ready .shot__placeholder {
      opacity: 0;
    }

    .shot__filename {
      display: inline-block;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.24);
      color: var(--text);
      font-size: 13px;
    }

    .shot figcaption {
      padding: 16px 18px 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .faq {
      display: grid;
      gap: 14px;
    }

    .faq details {
      padding: 18px 20px;
    }

    .faq summary {
      cursor: pointer;
      font-weight: 700;
    }

    .faq p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 34px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .footer__links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .footer__links a:hover {
      color: var(--text);
    }

    @media (max-width: 980px) {
      .hero,
      .grid--2,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .downloads {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .shots {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .device--phone {
        justify-self: start;
      }
    }

    @media (max-width: 720px) {
      .site-shell {
        width: min(100%, calc(100% - 24px));
      }

      .topbar {
        position: static;
        flex-wrap: wrap;
      }

      .topnav {
        display: none;
      }

      .hero__copy,
      .hero__visual,
      .card,
      .download,
      .info-panel,
      .faq details {
        border-radius: 24px;
      }

      .hero__meta,
      .downloads,
      .shots,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="#top">
        <span class="brand__mark">A</span>
        <span>
          <strong>AuSearch &amp; AuBackup</strong>
          <small data-en="Official app downloads" data-zh="官方应用下载"></small>
        </span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="#products" data-en="Products" data-zh="产品"></a>
        <a href="#downloads" data-en="Downloads" data-zh="下载"></a>
        <a href="#screenshots" data-en="Screenshots" data-zh="截图"></a>
        <a href="#faq" data-en="FAQ" data-zh="常见问题"></a>
      </nav>
      <button id="lang-toggle" class="lang-toggle" type="button" aria-label="切换到中文">中文</button>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero__copy">
          <span class="eyebrow" data-en="Official distribution site" data-zh="官方分发站点"></span>
          <h1
            data-en="Fast visual search on desktop. Reliable photo backup on iPhone."

          <p
            class="lead"
            data-en="AuSearch helps you find local images with AI-powered similarity search. AuBackup keeps photo transfer and backup on iPhone simple, fast, and easy to understand."
            data-zh="AuSearch 通过 AI 相似检索帮助你快速找到本地图片。AuBackup 让 iPhone 照片传输与备份更直接、更快速，也更易理解。"
          ></p>
          <div class="hero__actions">
            <a
              class="button"
              href="https://apps.microsoft.com/detail/9n5n8gvnrzdn"
              target="_blank"
              rel="noreferrer"
              data-en="Get it from Microsoft Store"
              data-zh="从 Microsoft Store 获取"
            ></a>
            <a class="button button--ghost" href="#downloads" data-en="See all downloads" data-zh="查看所有下载"></a>
          </div>
          <ul class="hero__meta">
            <li>
              <span class="meta__label" data-en="Desktop app" data-zh="桌面应用"></span>
              <span data-en="AuSearch for Windows and macOS" data-zh="AuSearch 支持 Windows 与 macOS"></span>
            </li>
            <li>
              <span class="meta__label" data-en="Mobile app" data-zh="移动应用"></span>
              <span data-en="AuBackup for iPhone" data-zh="AuBackup 支持 iPhone"></span>
            </li>
            <li>
              <span class="meta__label" data-en="Current status" data-zh="当前状态"></span>
              <span data-en="Windows available, macOS and iOS links pending" data-zh="Windows 已上线，macOS 与 iOS 链接待补充"></span>
            </li>
            <li>
              <span class="meta__label" data-en="Android" data-zh="Android"></span>
              <span data-en="Coming soon" data-zh="即将推出"></span>
            </li>
          </ul>
        </div>

        <div class="hero__visual" aria-hidden="true">
          <div class="device device--desktop">
            <div class="device__chrome"><span></span><span></span><span></span></div>
            <div class="mock-search">
              <div class="mock-bar" data-en="Search by image, keyword, or similarity…" data-zh="按图片、关键词或相似度搜索…"></div>
              <div class="mock-grid">
                <div class="mock-tile"></div>
                <div class="mock-tile"></div>
                <div class="mock-tile"></div>
                <div class="mock-tile"></div>
                <div class="mock-tile"></div>
                <div class="mock-tile"></div>
              </div>
              <div class="mock-pill-row">
                <span class="mock-pill">AI Search</span>
                <span class="mock-pill">Local Library</span>
                <span class="mock-pill">Fast Preview</span>
              </div>
            </div>
          </div>
          <div class="device device--phone">
            <div class="device__chrome"><span></span><span></span><span></span></div>
            <div class="mock-phone">
              <div class="mock-phone__card"></div>
              <div class="mock-phone__card"></div>
              <div class="mock-phone__card"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="products" class="section">
        <div class="section__intro">
          <span class="eyebrow" data-en="Products" data-zh="产品"></span>
          <h2 data-en="Two apps, one consistent experience" data-zh="两个应用，一套一致体验"></h2>
          <p
            data-en="The website uses a desktop-and-iOS friendly visual language: dark glass panels, Apple-inspired blue accents, rounded hardware-inspired surfaces, and compact utility-first content blocks."
            data-zh="网站采用兼容桌面端与 iOS 的视觉语言：深色玻璃质感面板、Apple 风格蓝色点缀、带硬件感的圆角表面，以及紧凑的功能型内容布局。"
          ></p>
        </div>

        <div class="grid grid--2">
          <article class="card">
            <h3 data-en="AuSearch" data-zh="AuSearch"></h3>
            <p
              data-en="AI-powered local image search for desktop. Built for fast browsing, visual similarity search, and practical library management."
              data-zh="面向桌面端的 AI 本地图片搜索工具，适合快速浏览、视觉相似检索与高效图库管理。"
            ></p>
            <ul class="feature-list">
              <li>
                <span class="dot"></span>
                <span>
                  <strong data-en="Visual similarity search" data-zh="视觉相似搜索"></strong>
                  <span data-en="Find related images without relying only on filenames." data-zh="不只依赖文件名，也能找到相似图片。"></span>

              </li>

                <span class="dot"></span>
                <span>
                  <strong data-en="Desktop-first workflow" data-zh="桌面优先工作流"></strong>
                  <span data-en="Designed for larger libraries, previews, and repeated search tasks." data-zh="为大图库、预览操作和高频搜索场景而设计。"></span>
                </span>
              </li>
              <li>
                <span class="dot"></span>
                <span>
                  <strong data-en="Clean utility UI" data-zh="清爽高效界面"></strong>
                  <span data-en="Focused controls that stay close to the app’s native visual language." data-zh="控制项简洁直接，与应用原生风格保持一致。"></span>
                </span>
              </li>
            </ul>
          </article>

          <article class="card">
            <h3 data-en="AuBackup" data-zh="AuBackup"></h3>
            <p
              data-en="An iPhone companion app for transferring and backing up photos with a simple, reliable flow that matches the desktop ecosystem."
              data-zh="面向 iPhone 的配套应用，用更简单、更可靠的流程完成照片传输与备份，并与桌面端生态保持一致。"
            ></p>
            <ul class="feature-list">
              <li>
                <span class="dot"></span>
                <span>
                  <strong data-en="iPhone-oriented experience" data-zh="面向 iPhone 的体验"></strong>
                  <span data-en="Compact screens, clear status, and touch-friendly actions." data-zh="界面紧凑、状态明确、操作适合触控。"></span>
                </span>
              </li>
              <li>
                <span class="dot"></span>
                <span>
                  <strong data-en="Transfer clarity" data-zh="传输流程清晰"></strong>
                  <span data-en="Emphasizes confidence during photo movement and backup tasks." data-zh="在照片迁移与备份时提供更明确的操作反馈。"></span>
                </span>
              </li>
              <li>
                <span class="dot"></span>
                <span>
                  <strong data-en="Consistent branding" data-zh="统一品牌语言"></strong>
                  <span data-en="Pairs naturally with AuSearch in layout, tone, and interface rhythm." data-zh="在布局、语气和界面节奏上与 AuSearch 自然衔接。"></span>
                </span>
              </li>
            </ul>
          </article>
        </div>
      </section>

  <script>
    (() => {
      const storageKey = "aus-site-lang";
      const root = document.documentElement;
      const toggle = document.getElementById("lang-toggle");

      const applyLanguage = (lang) => {
        const useZh = lang === "zh";
        root.dataset.lang = lang;
        root.lang = useZh ? "zh-CN" : "en";

        document.querySelectorAll("[data-en]").forEach((node) => {
          node.textContent = useZh ? node.dataset.zh : node.dataset.en;
        });

        document.title = useZh
          ? "AuSearch & AuBackup | 官方下载"
          : "AuSearch & AuBackup | Official downloads";

        toggle.textContent = useZh ? "EN" : "中文";
        toggle.setAttribute("aria-label", useZh ? "Switch to English" : "切换到中文");

        localStorage.setItem(storageKey, lang);
      };

      const savedLang = localStorage.getItem(storageKey);
      const autoLang = navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en";
      applyLanguage(savedLang || autoLang);

      toggle.addEventListener("click", () => {
        applyLanguage(root.dataset.lang === "zh" ? "en" : "zh");
      });

      document.querySelectorAll(".shot").forEach((card) => {
        const image = card.querySelector("img");
        if (!image) {
          return;
        }

        const markReady = () => {
          card.classList.add("is-ready");
        };

        if (image.complete && image.naturalWidth > 0) {
          markReady();
          return;
        }

        image.addEventListener("load", markReady, { once: true });
      });
    })();
  </script>
